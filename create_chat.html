<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chipmunk Chat 2.0 - Create</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            padding: 40px;
            text-transform: uppercase;
        }
        .header {
            border-bottom: 2px solid #ffffff;
            padding-bottom: 10px;
            margin-bottom: 30px;
            color: #3366ff;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #ff3333;
        }
        input {
            background-color: #000000;
            border: 1px solid #ffffff;
            color: #ffffff;
            padding: 10px;
            font-family: 'Courier New', Courier, monospace;
            width: 300px;
            outline: none;
        }
        button {
            background-color: #ffffff;
            color: #000000;
            border: none;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            cursor: pointer;
            width: 322px;
        }
        button:hover {
            background-color: #3366ff;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="header">SYSTEM: CREATE NEW CHANNEL</div>
    <div class="input-group">
        <label>Chat Name</label>
        <input type="text" id="chatName">
    </div>
    <div class="input-group">
        <label>Chat Code (6 Digits)</label>
        <input type="text" id="chatCode" maxlength="6">
    </div>
    <button onclick="generateChat()">Create Chat</button>

    <script>
        function generateChat() {
            const name = document.getElementById('chatName').value;
            const code = document.getElementById('chatCode').value;
            const creator = localStorage.getItem('chat_user');

            if (name && code.length === 6) {
                const chatId = 'chat-' + Math.random().toString(36).substr(2, 9);
                const chatData = {
                    id: chatId,
                    name: name,
                    code: code,
                    creator: creator,
                    users: [creator],
                    messages: []
                };

                let allChats = JSON.parse(localStorage.getItem('all_chats') || '[]');
                allChats.push(chatData);
                localStorage.setItem('all_chats', JSON.stringify(allChats));
                
                alert('CHAT CREATED: ' + chatId);
                window.location.href = 'select_screen.html';
            } else {
                alert('INVALID INPUT');
            }
        }
    </script>
</body>
</html>
