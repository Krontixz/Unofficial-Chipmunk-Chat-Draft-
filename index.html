<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        background-color: #050505;
        color: #e0e0e0;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      #status-bar {
        background: #111;
        padding: 5px 15px;
        font-size: 12px;
        border-bottom: 1px solid #333;
        color: #00ff41;
        display: flex;
        justify-content: space-between;
      }
      #chat-box {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background: radial-gradient(circle at center, #111 0%, #050505 100%);
      }
      .msg-card {
        background: rgba(255,255,255,0.03);
        border-left: 3px solid #00ff41;
        margin-bottom: 12px;
        padding: 10px;
        border-radius: 0 4px 4px 0;
        animation: slideIn 0.2s ease-out;
      }
      @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } }
      
      .u-name { font-weight: bold; color: #00ff41; margin-right: 8px; }
      .u-email { font-size: 10px; color: #666; }
      .u-text { display: block; margin-top: 5px; word-wrap: break-word; }

      #input-container {
        background: #111;
        padding: 20px;
        border-top: 1px solid #333;
        display: grid;
        grid-template-columns: 1fr 1fr 3fr;
        gap: 10px;
      }
      input {
        background: #000;
        border: 1px solid #444;
        color: white;
        padding: 10px;
        border-radius: 4px;
        outline: none;
      }
      input:focus { border-color: #00ff41; }
      #btn-send { background: #00ff41; color: black; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div id="status-bar">
      <span>CHIPMUNK PROTOCOL v2.0</span>
      <span id="connection">CONNECTED // SECURE</span>
    </div>

    <div id="chat-box" id="logs">
      <div class="msg-card">System: Enter Username, Password, and Message to start.</div>
    </div>

    <div id="input-container">
      <input type="text" id="user" placeholder="Username">
      <input type="password" id="pass" placeholder="Secret Key">
      <input type="text" id="msg" placeholder="Type a secure message...">
      <button id="btn-send" onclick="send()">SEND</button>
    </div>

    <script>
      let lastIndex = -1;

      function send() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const m = document.getElementById('msg').value;

        if(!u || !p || !m) return alert("All fields required!");

        google.script.run.withSuccessHandler(() => {
          document.getElementById('msg').value = "";
        }).pushMessages(u, p, m);
      }

      function update() {
        google.script.run.withSuccessHandler((newMsgs) => {
          if (newMsgs.length > 0) {
            const box = document.getElementById('chat-box');
            newMsgs.forEach(item => {
              const div = document.createElement('div');
              div.className = 'msg-card';
              div.innerHTML = `
                <span class="u-name">${item.u}</span>
                <span class="u-email">${item.e}</span>
                <span class="u-text">${item.m}</span>
              `;
              box.appendChild(div);
              lastIndex++;
            });
            box.scrollTop = box.scrollHeight;
          }
        }).importMessages(lastIndex);
      }

      setInterval(update, 2500); // 2.5s sync for high speed without crashing
    </script>
  </body>
</html>
